spring.application.name=bar-app
app.cors.allowed-origins=http://localhost:3000
app.jwt.secret=${JWT_SECRET_KEY:phmZF7/esaVqZuONpGaDe10WnFhdE2wxyUWrzwt//azt4vjvAmo+VqUIi/oOuyZO}
# Configuracion de la base de datos
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion de JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# configuracion de almacenamiento de imagenes
app.upload.dir=./uploads/images/products
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB